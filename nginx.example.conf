# nginx config for Llama Runner MIMO (IP-based, no domain)
# Place in /etc/nginx/sites-available/llama-runner

# --- Вариант A: С самоподписанным сертификатом (HTTPS) ---
#
# Генерация сертификата:
#   openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#     -keyout /etc/ssl/private/llama-runner.key \
#     -out /etc/ssl/certs/llama-runner.crt \
#     -subj "/CN=llama-runner"

server {
    listen 443 ssl;
    server_name 192.168.1.100;  # <-- ваш IP

    ssl_certificate /etc/ssl/certs/llama-runner.crt;
    ssl_certificate_key /etc/ssl/private/llama-runner.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    location / {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
    }

    # SSE streaming (chat)
    location /api/chat {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 900s;
    }
}

